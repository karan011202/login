<ion-header [translucent]="true">
  <ion-toolbar>
     <ion-title color="dark" class="ion-text-center">FORGOT PASSWORD</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content>
<ion-card color="primary">
  <ion-card-header>
  <ion-card-title>
    RESET PASSWORD
  </ion-card-title>
  </ion-card-header>
<ion-card-content>
  <form #resetForm="ngForm">


  <ion-item>
    <ion-label position="floating">Email</ion-label>
    <ion-input
      type="email"
      name="email"
      [(ngModel)]="data.email"
      >
    </ion-input>
  </ion-item>

 
  <ion-button expand="block"
              (click)="sendOtp()"
              [disabled]="!data.email">
    Send OTP
  </ion-button>


  <ion-item>
    <ion-label position="floating">OTP</ion-label>
    <ion-input
      type="text"
      name="otp"
      [(ngModel)]="data.otp">
    </ion-input>
  </ion-item>

 
  <ion-item>
    <ion-label position="floating">New Password</ion-label>
    <ion-input
      type="password"
      name="newPassword"
      [(ngModel)]="data.newPassword">
    </ion-input>
  </ion-item>


  <ion-item>
    <ion-label position="floating">Confirm Password</ion-label>
    <ion-input
      type="password"
      name="confirmPassword"
      [(ngModel)]="data.confirmPassword">
    </ion-input>
  </ion-item>

  
  <ion-button expand="block"
              color="success"
              (click)="resetPassword()">
    Reset Password
  </ion-button>

</form>

</ion-card-content>
</ion-card>
</ion-content>
